name: Build & Push Docker Image

# Rebuilds and publishes the container image to ghcr.io only when files that
# affect the image change on the default branch.  All other CI jobs pull the
# pre-built image rather than rebuilding from scratch every run.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - "frontend/**"
      - "backend/Cargo.toml"
      - "backend/Cargo.lock"
      - "backend/src/**"
      - "backend/migrations/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
