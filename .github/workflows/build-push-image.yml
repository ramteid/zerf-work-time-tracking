name: Build & Push Docker Image

# Rebuilds and publishes the container image to ghcr.io only when files that
# affect the image change on the default branch.  All other CI jobs pull the
# pre-built image rather than rebuilding from scratch every run.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
      - "frontend/**"
      - "backend/Cargo.toml"
      - "backend/Cargo.lock"
      - "backend/src/**"
      - "backend/migrations/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry (with retries)
        shell: bash
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin; then
              echo "Logged in to ghcr.io on attempt ${attempt}."
              exit 0
            fi
            backoff=$((attempt * 5))
            echo "ghcr.io login attempt ${attempt} failed; retrying in ${backoff}s..."
            sleep "${backoff}"
          done
          echo "Failed to login to ghcr.io after 5 attempts." >&2
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
