name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run picks up advisories surfaced by Dependabot.
    - cron: "0 5 * * 1"

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Backend (build, fmt, clippy, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (warnings allowed; advisory)
        continue-on-error: true
        run: cargo clippy --all-targets --all-features
      - name: Build (release)
        run: cargo build --release --locked
      - name: cargo-audit (RustSec advisories — advisory; daily 'audit' workflow files an issue on findings)
        continue-on-error: true
        run: |
          cargo install --locked cargo-audit
          cargo audit

  integration:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v5

      # The build-push-image workflow pushes sha-tagged images on source
      # changes.  By the time this job starts (rust job takes ~10 min),
      # that push is almost always complete.  On PRs or rare races we fall
      # back to building from the GHA layer cache.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built image
        id: pull
        continue-on-error: true
        run: docker pull ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Set up Docker Buildx
        if: steps.pull.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      - name: Build app image (fallback — not in registry yet)
        if: steps.pull.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration suite
        env:
          KITAZEIT_TEST_PORT: 3137
          IMG: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
        run: bash tests/run.sh

  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: integration
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built image
        id: pull
        continue-on-error: true
        run: docker pull ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Set up Docker Buildx
        if: steps.pull.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      # Fallback: use the GHA layer cache written by the integration job
      # (same workflow run, so the cache is always warm here).
      - name: Build app image (fallback — uses GHA layer cache)
        if: steps.pull.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  codeql:
    name: CodeQL (JavaScript)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3
