name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run picks up advisories surfaced by Dependabot.
    - cron: "0 5 * * 1"

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Backend (build, fmt, clippy, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kitazeit_test
          POSTGRES_PASSWORD: kitazeit_test
          POSTGRES_DB: kitazeit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kitazeit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (warnings allowed; advisory)
        continue-on-error: true
        run: cargo clippy --all-targets --all-features
      - name: Build (release)
        run: cargo build --release --locked
      - name: Integration tests
        env:
          DATABASE_URL: postgres://kitazeit_test:kitazeit_test@localhost:5432/kitazeit_test
        run: cargo test --test integration -- --nocapture
      - name: cargo-audit (RustSec advisories — advisory; daily 'audit' workflow files an issue on findings)
        continue-on-error: true
        run: |
          cargo install --locked cargo-audit
          cargo audit

  frontend:
    name: Frontend (build, lint, format, test, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci --no-audit --no-fund;
          else npm install --no-audit --no-fund; fi
      - name: Format check
        run: npm run format
      - name: Lint
        run: npm run lint
      - name: Vitest tests
        run: npm test
      - name: Build
        run: npm run build
      - name: npm audit (production)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  docker-smoke:
    name: Docker smoke tests
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kitazeit_smoke
          POSTGRES_PASSWORD: kitazeit_smoke
          POSTGRES_DB: kitazeit_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kitazeit_smoke -d kitazeit_smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      # The build-push-image workflow pushes sha-tagged images on source
      # changes.  By the time this job starts, that push is almost always
      # complete.  On PRs or rare races we fall back to building from the
      # GHA layer cache.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built image (sha tag)
        id: pull
        continue-on-error: true
        run: docker pull ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Pull pre-built image (latest fallback)
        id: pull-latest
        if: steps.pull.outcome == 'failure'
        continue-on-error: true
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest
          docker tag ghcr.io/${{ github.repository }}:latest ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Set up Docker Buildx
        if: steps.pull.outcome == 'failure' && steps.pull-latest.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      - name: Build app image (fallback — not in registry yet)
        if: steps.pull.outcome == 'failure' && steps.pull-latest.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        env:
          KITAZEIT_TEST_PORT: 3137
          IMG: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
        run: |
          docker run -d --name smoke \
            --add-host=host.docker.internal:host-gateway \
            -p ${KITAZEIT_TEST_PORT}:3000 \
            -e KITAZEIT_DATABASE_URL=postgres://kitazeit_smoke:kitazeit_smoke@host.docker.internal:5432/kitazeit_smoke \
            -e KITAZEIT_SESSION_SECRET=ci-test-secret-at-least-32-bytes-long \
            -e KITAZEIT_ADMIN_EMAIL=admin@test.local \
            "$IMG"
          # Wait for the container to become ready (up to 30 s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${KITAZEIT_TEST_PORT}/api/v1/settings/public | grep -q ui_language; then
              echo "Smoke test passed (container ready after ${i}s)"
              docker stop smoke && docker rm smoke
              exit 0
            fi
            sleep 1
          done
          echo "Smoke test failed — container not ready after 30 s"
          docker logs smoke
          docker stop smoke && docker rm smoke
          exit 1

  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: docker-smoke
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built image (sha tag)
        id: pull
        continue-on-error: true
        run: docker pull ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Pull pre-built image (latest fallback)
        id: pull-latest
        if: steps.pull.outcome == 'failure'
        continue-on-error: true
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest
          docker tag ghcr.io/${{ github.repository }}:latest ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Set up Docker Buildx
        if: steps.pull.outcome == 'failure' && steps.pull-latest.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      - name: Build app image (fallback — uses GHA layer cache)
        if: steps.pull.outcome == 'failure' && steps.pull-latest.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  codeql:
    name: CodeQL (JavaScript)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # Restrict to the new Svelte frontend so the analysis is meaningful.
          source-root: frontend
      - uses: github/codeql-action/analyze@v3
