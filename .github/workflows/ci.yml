name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run picks up advisories surfaced by Dependabot.
    - cron: "0 5 * * 1"

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Backend (build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Build (release)
        run: cargo build --release --locked
      - name: Integration tests (testcontainers)
        run: cargo test --test integration -- --nocapture
      - name: cargo-audit (RustSec advisories — advisory; daily 'audit' workflow files an issue on findings)
        continue-on-error: true
        run: |
          cargo install --locked cargo-audit
          cargo audit

  frontend:
    name: Frontend (build, format, test, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci --no-audit --no-fund;
          else npm install --no-audit --no-fund; fi
      - name: Vitest tests
        run: npm test
      - name: Build
        run: npm run build
      - name: npm audit (production)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  docker-smoke:
    name: Docker smoke tests
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: zerf_smoke
          POSTGRES_PASSWORD: zerf_smoke
          POSTGRES_DB: zerf_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zerf_smoke -d zerf_smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      # The build-push-image workflow pushes sha-tagged images on source
      # changes.  By the time this job starts, that push is almost always
      # complete.  On PRs or rare races we fall back to building from the
      # GHA layer cache.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built image (sha tag)
        id: pull
        continue-on-error: true
        run: docker pull ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Pull pre-built image (latest fallback)
        id: pull-latest
        if: steps.pull.outcome == 'failure'
        continue-on-error: true
        run: |
          docker pull ${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Set up Docker Buildx
        if: steps.pull.outcome == 'failure' && steps.pull-latest.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      - name: Build app image (fallback — not in registry yet)
        if: steps.pull.outcome == 'failure' && steps.pull-latest.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        env:
          ZERF_TEST_PORT: 3137
          IMG: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        run: |
          docker run -d --name smoke \
            --add-host=host.docker.internal:host-gateway \
            -p ${ZERF_TEST_PORT}:3000 \
            -e ZERF_DATABASE_URL=postgres://zerf_smoke:zerf_smoke@host.docker.internal:5432/zerf_smoke \
            -e ZERF_SESSION_SECRET=ci-test-secret-at-least-32-bytes-long \
            "$IMG"
          # Wait for the container to become ready (up to 30 s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${ZERF_TEST_PORT}/api/v1/settings/public | grep -q ui_language; then
              echo "Smoke test passed (container ready after ${i}s)"
              docker stop smoke && docker rm smoke
              exit 0
            fi
            sleep 1
          done
          echo "Smoke test failed — container not ready after 30 s"
          docker logs smoke
          docker stop smoke && docker rm smoke
          exit 1

  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: docker-smoke
    steps:
      - uses: actions/checkout@v5

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built image (sha tag)
        id: pull
        continue-on-error: true
        run: docker pull ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Pull pre-built image (latest fallback)
        id: pull-latest
        if: steps.pull.outcome == 'failure'
        continue-on-error: true
        run: |
          docker pull ${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Set up Docker Buildx
        if: steps.pull.outcome == 'failure' && steps.pull-latest.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      - name: Build app image (fallback — uses GHA layer cache)
        if: steps.pull.outcome == 'failure' && steps.pull-latest.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  codeql:
    name: CodeQL (JavaScript)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript
          # Restrict to the new Svelte frontend so the analysis is meaningful.
          source-root: frontend
      - uses: github/codeql-action/analyze@v4
