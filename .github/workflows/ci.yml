name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run picks up advisories surfaced by Dependabot.
    - cron: "0 5 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Backend (build, fmt, clippy, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (warnings allowed; advisory)
        continue-on-error: true
        run: cargo clippy --all-targets --all-features
      - name: Build (release)
        run: cargo build --release
      - name: cargo-audit (RustSec advisories — advisory; daily 'audit' workflow files an issue on findings)
        continue-on-error: true
        run: |
          cargo install --locked cargo-audit
          cargo audit

  integration:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build app image
        run: docker build -t kitazeit:ci .
      - name: Run integration suite
        env:
          KITAZEIT_TEST_PORT: 3137
        run: bash tests/run.sh

  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: integration
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Build app image
        run: docker build -t kitazeit:scan .
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: kitazeit:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  codeql:
    name: CodeQL (JavaScript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3
