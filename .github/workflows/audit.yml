name: Security audit

on:
  push:
    branches: [main]
    paths:
      - "backend/Cargo.toml"
      - "backend/Cargo.lock"
      - "backend/.cargo/audit.toml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/audit.yml"
  schedule:
    # Daily at 04:00 UTC: catch new RustSec advisories quickly.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cargo-audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo audit (RustSec advisories)
        continue-on-error: true
        working-directory: backend
        run: |
          cargo install --locked cargo-audit
          # RUSTSEC-2023-0071: Marvin Attack timing sidechannel in the `rsa`
          # crate. Pulled in transitively via `sqlx-mysql`, but the `mysql`
          # sqlx feature is disabled in our build, so the vulnerable code is
          # not compiled into the binary. No patched `rsa` release exists
          # yet — revisit when one ships.
          cargo audit --ignore RUSTSEC-2023-0071

  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (no scripts, no audit)
        run: |
          if [ -f package-lock.json ]; then npm ci --ignore-scripts --no-audit --no-fund;
          else npm install --ignore-scripts --no-audit --no-fund; fi
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
