<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KitaZeit — Time Tracking for Kindergartens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="tokens.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="time-entry.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="lead-admin.jsx"></script>

  <script type="text/babel">
    const App = () => (
      <DesignCanvas>
        {/* ── Employee Screens ── */}
        <DCSection id="time-entry" title="Time Entry" subtitle="The hero screen — weekly time logging for employees">
          <DCArtboard id="desktop" label="Desktop" width={1120} height={720}>
            <TimeEntryDesktop/>
          </DCArtboard>
          <DCArtboard id="mobile" label="Mobile" width={375} height={740}>
            <TimeEntryMobile/>
          </DCArtboard>
        </DCSection>

        <DCSection id="absences" title="Absences" subtitle="Vacation, sick leave & training day management">
          <DCArtboard id="abs-desktop" label="Desktop" width={1120} height={720}>
            <AbsencesDesktop/>
          </DCArtboard>
          <DCArtboard id="abs-mobile" label="Mobile" width={375} height={740}>
            <AbsencesMobile/>
          </DCArtboard>
        </DCSection>

        <DCSection id="calendar" title="Calendar" subtitle="Monthly view with events, absences & holidays">
          <DCArtboard id="cal-desktop" label="Desktop" width={1120} height={720}>
            <CalendarDesktop/>
          </DCArtboard>
        </DCSection>

        <DCSection id="account" title="Account" subtitle="Profile & preferences">
          <DCArtboard id="acc-desktop" label="Desktop" width={1120} height={720}>
            <AccountDesktop/>
          </DCArtboard>
        </DCSection>

        {/* ── Lead Screens ── */}
        <DCSection id="lead" title="Lead · Dashboard" subtitle="Approve timesheets and manage absence requests">
          <DCArtboard id="lead-dash" label="Dashboard" width={1120} height={720}>
            <LeadDashboard/>
          </DCArtboard>
          <DCArtboard id="lead-reports" label="Reports" width={1120} height={720}>
            <ReportsDesktop/>
          </DCArtboard>
        </DCSection>

        {/* ── Admin ── */}
        <DCSection id="admin" title="Admin · Settings" subtitle="Team, categories & Kita configuration">
          <DCArtboard id="admin-settings" label="Settings" width={1120} height={720}>
            <AdminSettings/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
