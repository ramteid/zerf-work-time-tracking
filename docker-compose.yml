services:
  app:
    build: .
    image: kitazeit:local
    container_name: kitazeit-app
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data:/app/data
    environment:
      - KITAZEIT_DATABASE_PATH=/app/data/kitazeit.db
      - KITAZEIT_SESSION_SECRET=${KITAZEIT_SESSION_SECRET:?KITAZEIT_SESSION_SECRET must be set in .env (>=32 chars random)}
      - KITAZEIT_ADMIN_EMAIL=${KITAZEIT_ADMIN_EMAIL:?KITAZEIT_ADMIN_EMAIL must be set in .env}
      - KITAZEIT_ORGANIZATION_NAME=${KITAZEIT_ORGANIZATION_NAME:-Kindergarten}
      - KITAZEIT_REGION=${KITAZEIT_REGION:-BW}
      - KITAZEIT_BIND=0.0.0.0:3000
      - KITAZEIT_PUBLIC_URL=https://${KITAZEIT_DOMAIN:?KITAZEIT_DOMAIN must be set in .env}
      - KITAZEIT_ALLOWED_ORIGINS=https://${KITAZEIT_DOMAIN}
      - KITAZEIT_SECURE_COOKIES=${KITAZEIT_SECURE_COOKIES:-true}
      - KITAZEIT_ENFORCE_CSRF=${KITAZEIT_ENFORCE_CSRF:-true}
      - KITAZEIT_ENFORCE_ORIGIN=${KITAZEIT_ENFORCE_ORIGIN:-true}
    expose:
      - "3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "wget -qO- --timeout=3 http://127.0.0.1:3000/healthz | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: kitazeit-caddy
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - KITAZEIT_DOMAIN=${KITAZEIT_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
