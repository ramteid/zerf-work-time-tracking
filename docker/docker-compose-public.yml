services:
  app:
    environment:
      - ZERF_PUBLIC_URL=https://${ZERF_DOMAIN:?ZERF_DOMAIN must be set in .env}
      - ZERF_ALLOWED_ORIGINS=https://${ZERF_DOMAIN:?ZERF_DOMAIN must be set in .env}
      - ZERF_SECURE_COOKIES=true
      - ZERF_ENFORCE_CSRF=true
      - ZERF_ENFORCE_ORIGIN=true

  caddy:
    image: caddy:2-alpine
    container_name: zerf-caddy
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - ZERF_DOMAIN=${ZERF_DOMAIN:?ZERF_DOMAIN must be set in .env}
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - public

volumes:
  caddy_data:
    name: zerf_caddy_data
  caddy_config:
    name: zerf_caddy_config
