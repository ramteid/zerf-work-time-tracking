services:
  caddy:
    image: caddy:2-alpine
    container_name: kitazeit-caddy
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - KITAZEIT_DOMAIN=${KITAZEIT_DOMAIN:-localhost}
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - public

volumes:
  caddy_data:
  caddy_config: