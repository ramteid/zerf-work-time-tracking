services:
  postgres:
    image: postgres:18
    container_name: zerf-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_DB=${ZERF_POSTGRES_DB:-zerf}
      - POSTGRES_USER=${ZERF_POSTGRES_USER:-zerf}
      - POSTGRES_PASSWORD=${ZERF_POSTGRES_PASSWORD:?ZERF_POSTGRES_PASSWORD must be set in .env (openssl rand -hex 32)}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256 --data-checksums
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - ssl=off
      - -c
      - idle_in_transaction_session_timeout=30000
      - -c
      - statement_timeout=30000
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - private

  app:
    build:
      context: ..
    container_name: zerf-app
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ZERF_DATABASE_URL=${ZERF_DATABASE_URL:-postgres://${ZERF_POSTGRES_USER:-zerf}:${ZERF_POSTGRES_PASSWORD:?ZERF_POSTGRES_PASSWORD must be set in .env (openssl rand -hex 32)}@postgres:5432/${ZERF_POSTGRES_DB:-zerf}?sslmode=disable}
      - ZERF_SESSION_SECRET=${ZERF_SESSION_SECRET:?ZERF_SESSION_SECRET must be set in .env (>=32 chars random)}
      - ZERF_ADMIN_EMAIL=${ZERF_ADMIN_EMAIL:?ZERF_ADMIN_EMAIL must be set in .env}
      - ZERF_BIND=0.0.0.0:3000
      - ZERF_PUBLIC_URL=http://localhost:3000
      - ZERF_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - ZERF_SECURE_COOKIES=false
      - ZERF_ENFORCE_CSRF=true
      - ZERF_ENFORCE_ORIGIN=true
    ports:
      - "127.0.0.1:3000:3000"
    expose:
      - "3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "wget -qO- --timeout=3 http://127.0.0.1:3000/healthz | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - public
      - private

  backup:
    image: postgres:18
    container_name: zerf-backup
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=${ZERF_POSTGRES_DB:?ZERF_POSTGRES_DB must be set in .env}
      - PGUSER=${ZERF_POSTGRES_USER:?ZERF_POSTGRES_USER must be set in .env}
      - PGPASSWORD=${ZERF_POSTGRES_PASSWORD:?ZERF_POSTGRES_PASSWORD must be set in .env}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ../scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - backup_data:/backups
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh", "/backups"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - private

volumes:
  postgres_data:
    name: zerf_postgres_data
  backup_data:
    name: zerf_backup_data

networks:
  public:
  private:
    internal: true
