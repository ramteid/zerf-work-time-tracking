<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="16" fill="#0F766E"/>
  <circle cx="16" cy="16" r="11.5" fill="white" opacity="0.95"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#0D9488" stroke-width="0.5" opacity="0.4"/>
  <!-- Hour hand at 10 -->
  <line x1="16" y1="16" x2="9.9" y2="12.5" stroke="#0F766E" stroke-width="2.2" stroke-linecap="round"/>
